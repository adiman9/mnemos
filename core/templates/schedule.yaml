# mnemos scheduled skill execution
# Edit to customize which skills run and when.
# Used by scheduled-run.sh to determine what to execute.

# In-session loops (Claude Code /loop feature)
# Register automatically at session start. Fire while session is open.
# Supported intervals: s (seconds), m (minutes), h (hours), d (days). No weeks.
# Limitation: loops expire after 3 days and die when Claude Code exits.
# For most cases, prefer the external scheduler (schedule.sh) which doesn't expire.
# Loops are useful for high-frequency maintenance during active coding sessions.
loops:
  enabled: true
  skills:
    - interval: 1h
      skill: /observe
    - interval: 2h
      skill: /consolidate

# Daily skills — run once per day (external scheduler via schedule.sh)
daily:
  time: "09:00"  # Local time (24h format). Actual execution depends on scheduler.
  skills:
    - /observe           # L1: extract observations from session transcripts
    - /consolidate       # L1→L2: promote high-value observations to knowledge pipeline
    - /dream --daily     # L3: context-driven connections from today's activity
    - /curiosity         # Research discovery: generate and execute high-EIG research queries
    - /stats             # Vault metrics snapshot

# Weekly skills — run once per week
weekly:
  day: sunday       # Day of week
  time: "03:00"     # Run during off-hours
  skills:
    - /dream --weekly    # L3: deep cross-domain speculative connections (random sampling)
    - /graph health      # Graph structural analysis
    - /validate all      # Schema compliance sweep
    - /rethink           # Review accumulated observations and tensions
